<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="Revenue required to justify capex is about 2900 billion dollars versus about 75 billion realized, a roughly 37 times gap">
  <rect x="0.5" y="0.5" width="719" height="299" fill="#0e1111" stroke="rgba(217,226,217,0.16)"/>
  <text x="24" y="34" fill="#33ff66" font-size="13" font-weight="700">▌ AI REVENUE: REQUIRED vs REALIZED (annual)</text>
  <text x="24" y="54" fill="#6f7a71" font-size="11">$725B capex at 25% ROI implies ~$2.9T of revenue</text>

  <!-- Required bar -->
  <text x="24" y="112" fill="#d9e2d9" font-size="11">REQUIRED</text>
  <rect x="180" y="98" width="510" height="26" fill="#33ff66" opacity="0.85"/>
  <text x="684" y="116" fill="#04140a" font-size="12" font-weight="700" text-anchor="end">$2,900B</text>

  <!-- Realized bar -->
  <text x="24" y="170" fill="#d9e2d9" font-size="11">REALIZED</text>
  <rect x="180" y="156" width="13" height="26" fill="#6f7a71"/>
  <text x="203" y="174" fill="#6f7a71" font-size="12" font-weight="700">$75B</text>

  <!-- scale ticks -->
  <g stroke="rgba(217,226,217,0.10)">
    <line x1="180" y1="90" x2="180" y2="210"/>
    <line x1="435" y1="90" x2="435" y2="210"/>
    <line x1="690" y1="90" x2="690" y2="210"/>
  </g>
  <g fill="#6f7a71" font-size="10" text-anchor="middle">
    <text x="180" y="224">$0</text>
    <text x="435" y="224">$1,450B</text>
    <text x="690" y="224">$2,900B</text>
  </g>

  <!-- gap callout -->
  <text x="24" y="268" fill="#33ff66" font-size="12" font-weight="700">SHORTFALL ≈ 37×</text>
  <text x="180" y="268" fill="#6f7a71" font-size="11">(~9–10× under a modest-ROI assumption) — the central puzzle</text>
</svg>

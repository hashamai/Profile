<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="DRAM and HBM memory price index 2024 to 2026, both rising roughly 45 to 50 percent">
  <rect x="0.5" y="0.5" width="719" height="339" fill="#0e1111" stroke="rgba(217,226,217,0.16)"/>
  <text x="24" y="34" fill="#33ff66" font-size="13" font-weight="700">▌ MEMORY PRICE INDEX · 2024 = 100</text>
  <text x="24" y="54" fill="#6f7a71" font-size="11">Spot memory reallocated to AI clusters drives general-purpose scarcity</text>

  <!-- grid + y labels (value 100,120,140,160 -> y 229,166,103,40 offset +40) -->
  <g stroke="rgba(217,226,217,0.10)">
    <line x1="70" y1="269" x2="690" y2="269"/>
    <line x1="70" y1="206" x2="690" y2="206"/>
    <line x1="70" y1="143" x2="690" y2="143"/>
    <line x1="70" y1="80"  x2="690" y2="80"/>
  </g>
  <g fill="#6f7a71" font-size="10" text-anchor="end">
    <text x="60" y="273">100</text>
    <text x="60" y="210">120</text>
    <text x="60" y="147">140</text>
    <text x="60" y="84">160</text>
  </g>

  <!-- axes -->
  <line x1="70" y1="80" x2="70" y2="269" stroke="rgba(217,226,217,0.30)"/>
  <line x1="70" y1="269" x2="690" y2="269" stroke="rgba(217,226,217,0.30)"/>

  <!-- HBM line (+50%) -->
  <polyline fill="none" stroke="#33ff66" stroke-width="2" stroke-dasharray="5 4"
    points="70,269 148,250 225,228 303,206 380,181 458,159 535,137 613,124 690,111"/>
  <!-- DRAM line (+45%) -->
  <polyline fill="none" stroke="#d9e2d9" stroke-width="2"
    points="70,269 148,256 225,237 303,218 380,199 458,177 535,159 613,143 690,127"/>

  <!-- x labels -->
  <g fill="#6f7a71" font-size="10" text-anchor="middle">
    <text x="70"  y="288">Q1'24</text>
    <text x="225" y="288">Q3'24</text>
    <text x="380" y="288">Q1'25</text>
    <text x="535" y="288">Q3'25</text>
    <text x="690" y="288">Q1'26</text>
  </g>

  <!-- legend -->
  <g font-size="11">
    <line x1="90" y1="315" x2="118" y2="315" stroke="#33ff66" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="126" y="319" fill="#6f7a71">HBM (AI-grade)  +50%</text>
    <line x1="330" y1="315" x2="358" y2="315" stroke="#d9e2d9" stroke-width="2"/>
    <text x="366" y="319" fill="#6f7a71">DRAM spot  +45%</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="Timeline of major infrastructure overbuilds: 1846 railways, 2000 telecom fiber, 2026 AI data centers">
  <rect x="0.5" y="0.5" width="719" height="279" fill="#0e1111" stroke="rgba(217,226,217,0.16)"/>
  <text x="24" y="34" fill="#33ff66" font-size="13" font-weight="700">▌ OVERBUILD BUBBLES THROUGH HISTORY</text>
  <text x="24" y="54" fill="#6f7a71" font-size="11">Correct thesis, mispriced timing — a 180-year pattern</text>

  <!-- baseline -->
  <line x1="90" y1="150" x2="660" y2="150" stroke="rgba(217,226,217,0.30)"/>
  <g>
    <circle cx="120" cy="150" r="6" fill="#6f7a71"/>
    <circle cx="375" cy="150" r="6" fill="#6f7a71"/>
    <circle cx="630" cy="150" r="7" fill="#33ff66"/>
  </g>

  <!-- Railways -->
  <text x="120" y="112" fill="#d9e2d9" font-size="13" font-weight="700" text-anchor="middle">1846</text>
  <text x="120" y="130" fill="#6f7a71" font-size="11" text-anchor="middle">Railway Mania</text>
  <text x="120" y="182" fill="#d9e2d9" font-size="11" text-anchor="middle">£150M</text>
  <text x="120" y="200" fill="#6f7a71" font-size="10" text-anchor="middle">⅓ never built</text>

  <!-- Telecom -->
  <text x="375" y="112" fill="#d9e2d9" font-size="13" font-weight="700" text-anchor="middle">2000</text>
  <text x="375" y="130" fill="#6f7a71" font-size="11" text-anchor="middle">Telecom Fiber</text>
  <text x="375" y="182" fill="#d9e2d9" font-size="11" text-anchor="middle">$500B+</text>
  <text x="375" y="200" fill="#6f7a71" font-size="10" text-anchor="middle">97% dark → $2T lost</text>

  <!-- AI -->
  <text x="630" y="112" fill="#33ff66" font-size="13" font-weight="700" text-anchor="middle">2026</text>
  <text x="630" y="130" fill="#6f7a71" font-size="11" text-anchor="middle">AI Data Centers</text>
  <text x="630" y="182" fill="#33ff66" font-size="11" text-anchor="middle">$725B/yr</text>
  <text x="630" y="200" fill="#6f7a71" font-size="10" text-anchor="middle">demand unclear</text>

  <text x="375" y="248" fill="#6f7a71" font-size="11" text-anchor="middle">Each cycle: high returns → capital floods → over-capacity → survivors dominate</text>
</svg>

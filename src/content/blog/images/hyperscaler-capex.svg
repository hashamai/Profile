<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'JetBrains Mono', ui-monospace, monospace" role="img" aria-label="Hyperscaler capex as percent of operating cash flow, 2020 versus 2025 versus 2026, all far above the 10 to 15 percent historical norm">
  <rect x="0.5" y="0.5" width="719" height="319" fill="#0e1111" stroke="rgba(217,226,217,0.16)"/>
  <text x="24" y="34" fill="#33ff66" font-size="13" font-weight="700">▌ CAPEX AS % OF OPERATING CASH FLOW</text>
  <text x="24" y="54" fill="#6f7a71" font-size="11">A 38% average leaves little margin if AI revenue disappoints</text>

  <!-- y grid + labels (0..50 -> y250..60) -->
  <g stroke="rgba(217,226,217,0.10)">
    <line x1="80" y1="250" x2="690" y2="250"/>
    <line x1="80" y1="212" x2="690" y2="212"/>
    <line x1="80" y1="174" x2="690" y2="174"/>
    <line x1="80" y1="136" x2="690" y2="136"/>
    <line x1="80" y1="98"  x2="690" y2="98"/>
    <line x1="80" y1="60"  x2="690" y2="60"/>
  </g>
  <g fill="#6f7a71" font-size="10" text-anchor="end">
    <text x="72" y="254">0%</text>
    <text x="72" y="216">10%</text>
    <text x="72" y="178">20%</text>
    <text x="72" y="140">30%</text>
    <text x="72" y="102">40%</text>
    <text x="72" y="64">50%</text>
  </g>

  <!-- historical norm band 10-15% -->
  <rect x="80" y="193" width="610" height="19" fill="#33ff66" opacity="0.08"/>
  <text x="686" y="207" fill="#6f7a71" font-size="9.5" text-anchor="end">historical norm 10–15%</text>

  <!-- bars -->
  <g>
    <!-- Microsoft -->
    <rect x="90"  y="204.4" width="30" height="45.6"  fill="#3a4038"/>
    <rect x="126" y="117"   width="30" height="133"   fill="#6f7a71"/>
    <rect x="162" y="105.6" width="30" height="144.4" fill="#33ff66" opacity="0.85"/>
    <!-- Google -->
    <rect x="240" y="193"   width="30" height="57"    fill="#3a4038"/>
    <rect x="276" y="132.2" width="30" height="117.8" fill="#6f7a71"/>
    <rect x="312" y="113.2" width="30" height="136.8" fill="#33ff66" opacity="0.85"/>
    <!-- Amazon -->
    <rect x="390" y="189.2" width="30" height="60.8"  fill="#3a4038"/>
    <rect x="426" y="143.6" width="30" height="106.4" fill="#6f7a71"/>
    <rect x="462" y="128.4" width="30" height="121.6" fill="#33ff66" opacity="0.85"/>
    <!-- Meta -->
    <rect x="540" y="219.6" width="30" height="30.4"  fill="#3a4038"/>
    <rect x="576" y="90.4"  width="30" height="159.6" fill="#6f7a71"/>
    <rect x="612" y="67.6"  width="30" height="182.4" fill="#33ff66" opacity="0.85"/>
  </g>

  <!-- x labels -->
  <g fill="#d9e2d9" font-size="11" text-anchor="middle">
    <text x="141" y="270">Microsoft</text>
    <text x="291" y="270">Google</text>
    <text x="441" y="270">Amazon</text>
    <text x="591" y="270">Meta</text>
  </g>

  <!-- legend -->
  <g font-size="11">
    <rect x="150" y="292" width="12" height="12" fill="#3a4038"/>
    <text x="168" y="302" fill="#6f7a71">2020</text>
    <rect x="300" y="292" width="12" height="12" fill="#6f7a71"/>
    <text x="318" y="302" fill="#6f7a71">2025</text>
    <rect x="450" y="292" width="12" height="12" fill="#33ff66" opacity="0.85"/>
    <text x="468" y="302" fill="#6f7a71">2026</text>
  </g>
</svg>

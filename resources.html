<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Books, notes and thoughts on software engineering and AI" />
  <title>Resources · Tech Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <nav class="nav" aria-label="Main navigation">
      <div class="container nav-inner">
        <a href="index.html" class="logo">
          <span class="logo-dot" aria-hidden="true"></span>
          <span id="nav-name">Portfolio</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="education.html">Education</a></li>
          <li><a href="recommendations.html">Recommendations</a></li>
          <li><a href="resources.html">Resources</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <div class="container">
        <header class="page-header">
          <p class="section-label">Library</p>
          <h1>Resources</h1>
          <p>Books I'm reading, course notes, and my thoughts on software engineering and AI.</p>
        </header>

        <div class="filter-bar" id="resource-filters" role="group" aria-label="Filter resources">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="book">Books</button>
          <button class="filter-btn" data-filter="notes">Notes</button>
          <button class="filter-btn" data-filter="thought">Thoughts</button>
        </div>

        <div class="resource-feed" id="resource-feed"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <p>© <span id="footer-year"></span> <span id="footer-name">Muhammad Hasham</span>. Built with HTML, CSS & JS.</p>
        <ul class="footer-links">
          <li><a href="#" id="footer-github" target="_blank" rel="noopener">GitHub</a></li>
          <li><a href="#" id="footer-linkedin" target="_blank" rel="noopener">LinkedIn</a></li>
          <li><a href="projects.html">Projects</a></li>
        </ul>
      </div>
    </footer>
  </div>

  <script src="js/data.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>
  <script>
    initPortfolioChrome();

    const TYPE_LABELS = { book: "Book", notes: "Notes", thought: "Thought" };

    function formatDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    function renderResource(r) {
      const tags = (r.tags || []).map((t) => `<span class="tag">${t}</span>`).join("");
      const body = (r.body || []).map((p) => `<p>${p}</p>`).join("");
      const actions = [
        r.file ? `<a href="${r.file}" class="btn btn-outline" target="_blank" rel="noopener" download>Download ↓</a>` : "",
        r.link ? `<a href="${r.link}" class="btn btn-ghost" target="_blank" rel="noopener">Visit link →</a>` : "",
      ].join("");

      return `
        <article class="card resource-card" data-type="${r.type}">
          <div class="resource-meta">
            <span class="resource-type resource-type-${r.type}">${TYPE_LABELS[r.type] || r.type}</span>
            <time datetime="${r.date}">${formatDate(r.date)}</time>
          </div>
          <h2>${r.title}</h2>
          ${tags ? `<div class="project-tags">${tags}</div>` : ""}
          <div class="resource-body">${body}</div>
          ${actions.trim() ? `<div class="resource-actions">${actions}</div>` : ""}
        </article>`;
    }

    const feed = document.getElementById("resource-feed");
    const resources = [...(PORTFOLIO.resources || [])].sort(
      (a, b) => new Date(b.date) - new Date(a.date)
    );

    if (!resources.length) {
      feed.innerHTML = `<p class="empty-note">Nothing here yet. Add entries to the <code>resources</code> array in <code>js/data.js</code>.</p>`;
    } else {
      feed.innerHTML = resources.map(renderResource).join("");
    }

    document.querySelectorAll("#resource-filters .filter-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelector("#resource-filters .active")?.classList.remove("active");
        btn.classList.add("active");
        const filter = btn.dataset.filter;
        document.querySelectorAll(".resource-card").forEach((card) => {
          card.style.display = filter === "all" || card.dataset.type === filter ? "" : "none";
        });
      });
    });
  </script>
</body>
</html>
